# XcodeGen spec — source of truth for DevNotes.xcodeproj (macOS app wrapper).
# Core domain logic stays in the SwiftPM package (Package.swift) as the DevNotesCore
# library module; this Xcode app target compiles only the SwiftUI OS-shell sources and
# links that library, so `import DevNotesCore` resolves to the same module the headless
# test suite builds against. Regenerate with:  xcodegen generate
name: DevNotes
options:
  bundleIdPrefix: com.jsglazer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "PWGXN26URQ"
    SWIFT_VERSION: "6.0"

packages:
  DevNotesCore:
    path: .

targets:
  DevNotes:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/DevNotesApp
    dependencies:
      - package: DevNotesCore
        product: DevNotesCore
    settings:
      base:
        PRODUCT_NAME: DevNotes
        PRODUCT_BUNDLE_IDENTIFIER: com.jsglazer.DevNotes
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: DevNotes
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Josh Glazer"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: DevNotes.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "6.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
